<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subnet Toolkit</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="app">
  <h1>Subnet Toolkit</h1>

  <div class="tabs">
    <button class="tab active" data-tab="calc">Calculator</button>
    <button class="tab" data-tab="vlsm">VLSM</button>
    <button class="tab" data-tab="practice">Practice</button>
  </div>

  <div id="calc" class="tab-content active">
    <input id="ip" placeholder="IP Address">
    <input id="cidr" placeholder="CIDR (e.g. 24)">
    <button id="calcBtn">Calculate</button>
    <div id="result" class="output"></div>
  </div>

  <div id="vlsm" class="tab-content">
    <input id="vlsmBase" placeholder="192.168.1.0/24">
    <input id="hosts" placeholder="50,20,10">
    <button id="vlsmBtn">Calculate VLSM</button>
    <div id="vlsmResult" class="output"></div>
  </div>

  <div id="practice" class="tab-content">
    <button id="quizBtn">Generate Question</button>
    <div id="quiz"></div>
  </div>

  <button id="themeToggle">Toggle Theme</button>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
